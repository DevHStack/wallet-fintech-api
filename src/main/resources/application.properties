spring.application.name=wallet

# Basic authentication (override in production via environment variables)
wallet.security.user=wallet
wallet.security.password=wallet123

# Use H2 in-memory database for dev/test
spring.datasource.url=jdbc:h2:mem:wallet;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate DDL auto (schema managed by Flyway migrations)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# H2 console for local database inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Idempotency
idempotency.ttl-seconds=86400
idempotency.cleanup-interval-ms=3600000

# JWT (for resource server)
jwt.secret=my-super-secret-key-for-jwt-that-is-at-least-256-bits-long-enough

# SpringDoc OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
